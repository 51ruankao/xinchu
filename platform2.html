<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软考培训 · 视频与刷题并排</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #eef2f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .navbar {
            background: #1a2a3a;
            color: white;
            padding: 10px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .logo span {
            color: #6ab0e6;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .token-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .token-input-area input {
            padding: 6px 14px;
            border: 1.5px solid #445566;
            border-radius: 60px;
            font-size: 0.8rem;
            background: #2a3a4a;
            color: white;
            outline: none;
            min-width: 180px;
        }
        .token-input-area input::placeholder {
            color: #8899aa;
        }
        .token-input-area input:focus {
            border-color: #6ab0e6;
            background: #1a2a3a;
        }
        .token-input-area .btn {
            background: #1f7a5a;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .token-input-area .btn:hover {
            background: #146348;
        }
        .token-status {
            font-size: 0.75rem;
            color: #8899aa;
        }
        .token-status.ok {
            color: #5cb85c;
        }
        .token-status.error {
            color: #d9534f;
        }

        .download-btn {
            background: #1f7a5a;
            color: white;
            padding: 6px 18px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .download-btn:hover {
            background: #146348;
            transform: translateY(-1px);
        }

        .main-container {
            flex: 1;
            display: flex;
            gap: 12px;
            padding: 12px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #f8fafc;
            padding: 10px 16px;
            border-bottom: 2px solid #e8ecf0;
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .panel-header .badge {
            font-size: 0.7rem;
            background: #d5dce4;
            color: #4a6a7a;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 500;
        }

        .panel iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        .lock-overlay {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8aaec2;
            background: #f8fafc;
        }
        .lock-overlay .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .lock-overlay .hint {
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding: 8px;
                gap: 8px;
            }
            .panel {
                flex: 1 1 50%;
                min-height: 300px;
            }
            .navbar {
                padding: 8px 16px;
            }
            .logo {
                font-size: 1.1rem;
            }
            .token-input-area input {
                min-width: 120px;
                font-size: 0.7rem;
            }
            .download-btn {
                font-size: 0.8rem;
                padding: 4px 14px;
            }
        }

        @media (max-width: 480px) {
            .panel {
                min-height: 250px;
            }
            .panel-header {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            .token-input-area input {
                min-width: 80px;
                width: 100px;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">软考<span>· 学习平台</span></div>
        <div class="nav-right">
            <div class="token-input-area">
                <input type="password" id="tokenInput" placeholder="输入激活码">
                <button class="btn" id="tokenBtn">🔓 加载</button>
                <span class="token-status" id="tokenStatus">未激活</span>
            </div>
            <a href="#" class="download-btn" id="downloadBtn">📥 下载资料</a>
        </div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header">
                🎬 看视频
                <span class="badge">课程讲解</span>
            </div>
            <iframe id="videoFrame" src="about:blank"></iframe>
        </div>
        <div class="panel">
            <div class="panel-header">
                📝 刷题
                <span class="badge">在线练习</span>
            </div>
            <iframe id="quizFrame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // ================================================================
        // 从 localStorage 读取已保存的 token
        // ================================================================
        function getStoredToken() {
            try {
                return localStorage.getItem('ruankao_platform_token') || '';
            } catch (e) { return ''; }
        }

        function saveToken(token) {
            try {
                localStorage.setItem('ruankao_platform_token', token);
            } catch (e) {}
        }

        // ================================================================
        // 加载 iframe
        // ================================================================
        function loadFrames(token) {
            const cleanToken = token.trim();
            if (!cleanToken) {
                document.getElementById('tokenStatus').textContent = '❌ 请输入激活码';
                document.getElementById('tokenStatus').className = 'token-status error';
                return;
            }

            // 编码 token 防止特殊字符问题
            const encodedToken = encodeURIComponent(cleanToken);
            const videoSrc = `https://51ruankao.github.io/xinchu_shipin/index.html?token=${encodedToken}`;
            const quizSrc = `https://51ruankao.github.io/xinchu/index.html?token=${encodedToken}`;

            document.getElementById('videoFrame').src = videoSrc;
            document.getElementById('quizFrame').src = quizSrc;

            document.getElementById('tokenStatus').textContent = '✅ 已加载';
            document.getElementById('tokenStatus').className = 'token-status ok';
            saveToken(cleanToken);
        }

        // ================================================================
        // 初始化：自动加载已保存的 token
        // ================================================================
        const savedToken = getStoredToken();
        if (savedToken) {
            document.getElementById('tokenInput').value = savedToken;
            loadFrames(savedToken);
        }

        // ================================================================
        // 事件绑定
        // ================================================================
        document.getElementById('tokenBtn').addEventListener('click', function() {
            const token = document.getElementById('tokenInput').value;
            loadFrames(token);
        });

        document.getElementById('tokenInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('tokenBtn').click();
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // 请替换为您实际的下载链接
            const downloadUrl = 'https://pan.baidu.com/s/your-share-link';
            if (downloadUrl === 'https://pan.baidu.com/s/your-share-link') {
                alert('📂 请将 "下载资料" 按钮的链接替换为您课程讲义的下载地址。');
            } else {
                window.open(downloadUrl, '_blank');
            }
        });

        console.log('✅ 软考学习平台已加载');
        console.log('🔐 Token 存储在 localStorage 中，不会在代码中硬编码');
    </script>
</body>
</html>
