<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>软考学习平台 · 入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 44px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 6px;
        }
        .logo span { color: #2f7a9e; }
        .subtitle {
            color: #6a8a9a;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .token-area {
            background: #f8fafc;
            border-radius: 60px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1.5px solid #e8ecf0;
            margin-bottom: 20px;
        }
        .token-area input {
            flex: 1;
            border: none;
            padding: 10px 0;
            font-size: 0.85rem;
            background: transparent;
            outline: none;
            min-width: 80px;
        }
        .token-area input::placeholder {
            color: #b0c8d8;
        }
        .token-area .btn-load {
            background: #1a4d66;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .token-area .btn-load:hover {
            background: #0f3f55;
        }
        .token-status {
            font-size: 0.75rem;
            color: #8aaec2;
            margin-bottom: 16px;
            min-height: 20px;
        }
        .token-status.success { color: #1f7a5a; }
        .token-status.error { color: #c0392b; }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: 0.25s;
            border: none;
            cursor: pointer;
            opacity: 0.4;
            pointer-events: none;
        }
        .btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn.active:hover {
            transform: translateY(-2px);
        }
        .btn-video {
            background: #1a4d66;
            color: white;
        }
        .btn-video.active:hover {
            box-shadow: 0 6px 24px rgba(26, 77, 102, 0.35);
            background: #0f3f55;
        }
        .btn-quiz {
            background: #1f7a5a;
            color: white;
        }
        .btn-quiz.active:hover {
            box-shadow: 0 6px 24px rgba(31, 122, 90, 0.35);
            background: #146348;
        }
        .btn .icon { font-size: 1.5rem; }
        .btn .arrow { font-size: 1.1rem; opacity: 0.6; }
        .footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eef2f7;
            font-size: 0.7rem;
            color: #8aaec2;
        }
        .footer span { margin: 0 10px; }
        @media (max-width: 480px) {
            .container { padding: 24px 18px; }
            .logo { font-size: 1.4rem; }
            .btn { font-size: 0.95rem; padding: 13px 16px; }
            .token-area { flex-wrap: wrap; padding: 8px 8px 8px 14px; }
            .token-area input { width: 100%; }
            .token-area .btn-load { width: 100%; justify-content: center; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">软考<span>· 学习平台</span></div>
        <p class="subtitle">输入激活码，解锁全部功能</p>

        <!-- Token 输入区 -->
        <div class="token-area">
            <input type="password" id="tokenInput" placeholder="请输入激活码">
            <button class="btn-load" id="loadBtn">🔓 加载</button>
        </div>
        <div class="token-status" id="tokenStatus">💡 首次使用请输入激活码</div>

        <!-- 按钮组 -->
        <div class="btn-group">
            <a id="videoBtn" class="btn btn-video">
                <span class="icon">🎬</span> 看视频 <span class="arrow">→</span>
            </a>
            <a id="quizBtn" class="btn btn-quiz">
                <span class="icon">📝</span> 刷题 <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer">
            <span>🔐 激活码保存在本地浏览器</span>
            <span>📱 手机 / 电脑 均可使用</span>
        </div>
    </div>

    <script>
        // ================================================================
        // 从 localStorage 读取已保存的 Token
        // ================================================================
        function getStoredToken() {
            try { return localStorage.getItem('ruankao_token') || ''; } catch(e) { return ''; }
        }

        function saveToken(token) {
            try { localStorage.setItem('ruankao_token', token); } catch(e) {}
        }

        // ================================================================
        // 更新按钮链接
        // ================================================================
        const videoBtn = document.getElementById('videoBtn');
        const quizBtn = document.getElementById('quizBtn');
        const tokenInput = document.getElementById('tokenInput');
        const loadBtn = document.getElementById('loadBtn');
        const tokenStatus = document.getElementById('tokenStatus');

        function updateButtons(token) {
            const cleanToken = token.trim();
            if (!cleanToken) {
                videoBtn.classList.remove('active');
                quizBtn.classList.remove('active');
                videoBtn.href = '#';
                quizBtn.href = '#';
                tokenStatus.textContent = '⚠️ 请输入激活码';
                tokenStatus.className = 'token-status error';
                return;
            }
            const encoded = encodeURIComponent(cleanToken);
            videoBtn.href = 'https://51ruankao.github.io/xinchu/index_shipin2.html?token=' + encoded;
            quizBtn.href = 'https://51ruankao.github.io/xinchu/index_shuati2.html?token=' + encoded;
            videoBtn.classList.add('active');
            quizBtn.classList.add('active');
            tokenStatus.textContent = '✅ 已激活，点击按钮进入学习';
            tokenStatus.className = 'token-status success';
        }

        // ================================================================
        // 加载 Token
        // ================================================================
        function loadToken(token) {
            const raw = token.trim();
            if (!raw) {
                updateButtons('');
                return;
            }
            saveToken(raw);
            tokenInput.value = raw;
            updateButtons(raw);
        }

        // ================================================================
        // 初始化：自动加载已保存的 Token
        // ================================================================
        const saved = getStoredToken();
        if (saved) {
            tokenInput.value = saved;
            loadToken(saved);
        }

        // ================================================================
        // 事件绑定
        // ================================================================
        loadBtn.addEventListener('click', function() {
            loadToken(tokenInput.value);
        });

        tokenInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loadBtn.click();
            }
        });

        console.log('✅ 软考学习平台已加载');
        console.log('🔐 Token 存储在浏览器本地，不会泄露');
    </script>
</body>
</html>
