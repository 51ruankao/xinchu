<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软考培训 · 统一学习平台</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #eef2f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部导航栏 ===== */
        .navbar {
            background: #1a2a3a;
            color: white;
            padding: 8px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .logo span {
            color: #6ab0e6;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .download-btn {
            background: #1f7a5a;
            color: white;
            padding: 6px 18px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .download-btn:hover {
            background: #146348;
            transform: translateY(-1px);
        }

        /* ===== Tab 标签栏 ===== */
        .tab-bar {
            background: white;
            padding: 8px 24px 0 24px;
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #e8ecf0;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }

        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            color: #6a7a8a;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            border-radius: 8px 8px 0 0;
        }

        .tab-btn:hover {
            color: #1a2a3a;
            background: #f5f8fa;
        }

        .tab-btn.active {
            color: #1a4d66;
            border-bottom-color: #1a4d66;
            background: #f8fafc;
        }

        .tab-btn .badge {
            font-size: 0.7rem;
            background: #d5dce4;
            color: #4a6a7a;
            padding: 1px 10px;
            border-radius: 40px;
            font-weight: 500;
            margin-left: 6px;
        }

        .tab-btn.active .badge {
            background: #1a4d66;
            color: white;
        }

        /* ===== 内容容器 ===== */
        .content-container {
            flex: 1;
            padding: 12px;
            min-height: 0;
        }

        /* ===== 每个Tab对应的面板 ===== */
        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            gap: 12px;
        }

        .tab-panel.active {
            display: flex;
        }

        /* ===== 左右两栏（视频/刷题） ===== */
        .panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #f8fafc;
            padding: 10px 16px;
            border-bottom: 2px solid #e8ecf0;
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .panel iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        /* ===== 单页面模式（刷题或视频单独占满） ===== */
        .panel-full {
            flex: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .panel-full iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        /* ===== 响应式：窄屏时上下排列 ===== */
        @media (max-width: 768px) {
            .tab-panel.active {
                flex-direction: column;
            }
            .panel {
                flex: 1 1 50%;
                min-height: 300px;
            }
            .navbar {
                padding: 6px 16px;
            }
            .logo {
                font-size: 1.1rem;
            }
            .download-btn {
                font-size: 0.8rem;
                padding: 4px 14px;
            }
            .tab-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .content-container {
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .panel {
                min-height: 250px;
            }
            .panel-header {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            .tab-btn .badge {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="navbar">
        <div class="logo">软考<span>· 学习平台</span></div>
        <div class="nav-right">
            <a href="#" class="download-btn" id="downloadBtn">📥 下载资料</a>
        </div>
    </header>

    <!-- ===== Tab 标签栏 ===== -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="video">
            🎬 看视频 <span class="badge">课程讲解</span>
        </button>
        <button class="tab-btn" data-tab="practice">
            📝 刷题 <span class="badge">在线练习</span>
        </button>
    </div>

    <!-- ===== 内容容器 ===== -->
    <div class="content-container">

        <!-- ===== Tab1：看视频（左右分栏，保留扩展可能） ===== -->
        <div id="tab-video" class="tab-panel active">
            <div class="panel">
                <div class="panel-header">🎬 视频课程</div>
                <iframe src="https://51ruankao.github.io/xinchu_shipin/index.html?token=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"></iframe>
            </div>
            <!-- 右侧可以留空或放课程介绍，若不需要可删除 -->
            <div class="panel" style="flex:0 0 300px; background:#fafcfe; display:flex; align-items:center; justify-content:center; color:#8aaec2; font-size:0.9rem; flex-direction:column; gap:8px;">
                <div style="font-size:2rem;">📖</div>
                <div>课程配套资料</div>
                <div style="font-size:0.8rem;">讲义、软件等请点击顶部「下载资料」</div>
            </div>
        </div>

        <!-- ===== Tab2：刷题（左右分栏） ===== -->
        <div id="tab-practice" class="tab-panel">
            <div class="panel">
                <div class="panel-header">📝 刷题练习</div>
                <iframe src="https://51ruankao.github.io/xinchu/index.html?token=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"></iframe>
            </div>
            <div class="panel" style="flex:0 0 300px; background:#fafcfe; display:flex; align-items:center; justify-content:center; color:#8aaec2; font-size:0.9rem; flex-direction:column; gap:8px;">
                <div style="font-size:2rem;">📊</div>
                <div>学习进度</div>
                <div style="font-size:0.8rem;">错题本、模拟考试等功能在右侧刷题区</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. Tab 切换逻辑
        // ============================================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabPanels = {
            video: document.getElementById('tab-video'),
            practice: document.getElementById('tab-practice')
        };

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有按钮的 active 状态
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                // 隐藏所有面板
                Object.values(tabPanels).forEach(panel => {
                    panel.classList.remove('active');
                });

                // 显示对应的面板
                const tabName = this.dataset.tab;
                if (tabPanels[tabName]) {
                    tabPanels[tabName].classList.add('active');
                }
            });
        });

        // ============================================================
        // 2. 下载资料功能
        // ============================================================
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // 请将下方链接替换为您实际的资料下载地址
            const downloadUrl = 'https://pan.baidu.com/s/your-share-link';
            if (downloadUrl === 'https://pan.baidu.com/s/your-share-link') {
                alert('📂 请将 "下载资料" 按钮的链接替换为您课程讲义的下载地址（如百度网盘、阿里云盘等）。');
            } else {
                window.open(downloadUrl, '_blank');
            }
        });

        // 控制台提示
        console.log('✅ 软考学习平台已启动（Tab切换：视频 | 刷题）');
    </script>

</body>
</html>
