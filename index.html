<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>软考题库 · 刷题平台</title>
    <style>
        /* ★★★ 样式与之前相同，省略以节省篇幅，实际使用时保留完整样式 ★★★ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f7;
            padding: 16px;
            min-height: 100vh;
        }
        .app-wrapper {
            max-width: 860px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid #eef2f7;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a2a3a;
        }
        .logo span {
            color: #2f7a9e;
        }
        .status-badge {
            background: #eef2f7;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #4a6a7a;
        }

        .activation-area {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border: 1px solid #e8ecf0;
        }
        .activation-area input {
            flex: 1;
            min-width: 160px;
            padding: 12px 18px;
            border: 1.5px solid #d5dce4;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
            outline: none;
        }
        .activation-area input:focus {
            border-color: #2f7a9e;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1a4d66;
            color: white;
        }
        .btn-primary:hover {
            background: #0f3f55;
        }
        .btn-danger {
            background: #c0392b;
            color: white;
        }
        .btn-danger:hover {
            background: #a93226;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d5dce4;
            color: #4a6a7a;
        }
        .btn-outline:hover {
            background: #f0f4f8;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-success {
            background: #1f7a5a;
            color: white;
        }
        .btn-success:hover {
            background: #146348;
        }

        .status-msg {
            font-size: 0.9rem;
            color: #4a6a7a;
            padding: 4px 12px;
            border-radius: 40px;
            background: #eef2f7;
        }
        .status-msg.success {
            background: #dff0e6;
            color: #1b6b4a;
        }
        .status-msg.error {
            background: #fde8e8;
            color: #c0392b;
        }
        .status-msg.sync {
            background: #e3f0fa;
            color: #1a4d66;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: #f0f4f8;
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: transparent;
            color: #4a6a7a;
            transition: 0.15s;
            flex: 1;
            text-align: center;
            min-width: 60px;
        }
        .tab.active {
            background: white;
            color: #1a4d66;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .question-area {
            background: #fafcfe;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e8ecf0;
            min-height: 300px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .question-number {
            font-weight: 700;
            color: #1a2a3a;
            font-size: 1.1rem;
        }
        .question-text {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #1a2a3a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1.5px solid #e8ecf0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.1s;
            background: white;
        }
        .option:hover {
            border-color: #b0c8db;
        }
        .option.selected {
            border-color: #1a4d66;
            background: #eaf3fa;
        }
        .option.correct {
            border-color: #1f7a5a;
            background: #dff0e6;
        }
        .option.wrong {
            border-color: #c0392b;
            background: #fde8e8;
        }
        .option input[type="radio"] {
            accent-color: #1a4d66;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 0.95rem;
            color: #1a2a3a;
        }

        .explanation {
            background: #f0f4f8;
            padding: 14px 18px;
            border-radius: 12px;
            margin: 12px 0 16px;
            border-left: 4px solid #2f7a9e;
            font-size: 0.92rem;
            color: #1a2a3a;
            line-height: 1.6;
            display: none;
        }
        .explanation.show {
            display: block;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            justify-content: space-between;
            align-items: center;
        }
        .action-bar .left,
        .action-bar .right {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .wrong-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .wrong-item {
            background: white;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e8ecf0;
        }
        .wrong-item .q {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .wrong-item .a {
            font-size: 0.85rem;
            color: #4a6a7a;
        }
        .wrong-item .tag {
            font-size: 0.7rem;
            background: #fde8e8;
            color: #c0392b;
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .wrong-item .actions {
            margin-top: 6px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .exam-timer {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a4d66;
            text-align: center;
            padding: 12px;
            background: #f0f4f8;
            border-radius: 60px;
            margin-bottom: 16px;
        }
        .exam-timer.warning {
            color: #c0392b;
        }
        .exam-result {
            text-align: center;
            padding: 30px 20px;
        }
        .exam-result .score {
            font-size: 3rem;
            font-weight: 700;
            color: #1a4d66;
        }
        .exam-result .pass {
            color: #1f7a5a;
        }
        .exam-result .fail {
            color: #c0392b;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e8ecf0;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-bar .fill {
            height: 100%;
            background: #2f7a9e;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #4a6a7a;
            padding: 8px 0;
        }
        .stats span {
            background: #f0f4f8;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8aaec2;
        }
        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a3a;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            font-size: 0.9rem;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #1f7a5a;
        }
        .toast.error {
            background: #c0392b;
        }

        #userInfo {
            display: none;
        }
        #userInfo.active {
            display: flex !important;
        }

        .chapter-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .chapter-selector label {
            font-weight: 600;
            color: #1a2a3a;
            font-size: 0.95rem;
        }
        .chapter-selector select {
            padding: 8px 16px;
            border: 1.5px solid #d5dce4;
            border-radius: 60px;
            font-size: 0.95rem;
            background: white;
            outline: none;
            cursor: pointer;
            min-width: 140px;
        }
        .chapter-selector select:focus {
            border-color: #2f7a9e;
        }

        /* ★★★ 同步状态指示 ★★★ */
        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #4a6a7a;
            padding: 2px 10px;
            border-radius: 40px;
            background: #f0f4f8;
        }
        .sync-indicator.synced {
            color: #1f7a5a;
            background: #dff0e6;
        }
        .sync-indicator.syncing {
            color: #1a4d66;
            background: #e3f0fa;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .app-wrapper {
                padding: 16px;
            }
            .logo {
                font-size: 1.2rem;
            }
            .activation-area {
                flex-direction: column;
                padding: 12px;
            }
            .activation-area input {
                width: 100%;
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .btn {
                justify-content: center;
                padding: 10px 20px;
                font-size: 0.85rem;
            }
            .question-area {
                padding: 16px;
            }
            .question-text {
                font-size: 0.95rem;
            }
            .option {
                padding: 10px 12px;
            }
            .option label {
                font-size: 0.88rem;
            }
            .tab {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-bar .left,
            .action-bar .right {
                justify-content: center;
            }
            .stats {
                gap: 10px;
                font-size: 0.75rem;
            }
            .exam-timer {
                font-size: 1rem;
                padding: 8px;
            }
            .chapter-selector {
                flex-direction: column;
                align-items: stretch;
            }
            .chapter-selector select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="header">
            <div class="logo">软考<span>· 刷题</span></div>
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <span class="sync-indicator" id="syncIndicator"><i class="fas fa-cloud"></i> 已同步</span>
                <div class="status-badge" id="statusBadge">📱 未激活</div>
            </div>
        </header>

        <div class="activation-area" id="activationArea">
            <input type="tel" id="phoneInput" placeholder="请输入手机号码" maxlength="11" value="13800138000">
            <button class="btn btn-primary" id="activateBtn"><i class="fas fa-unlock"></i> 激活</button>
            <span class="status-msg" id="statusMsg">点击激活即可开始刷题</span>
        </div>

        <div id="userInfo" style="background:#dff0e6; border-radius:60px; padding:8px 18px; margin-bottom:16px; display:none; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
            <span style="font-weight:500; color:#1b6b4a;"><i class="fas fa-check-circle"></i> 已激活: <span id="activePhoneDisplay"></span></span>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" id="syncBtn" style="padding:4px 12px;"><i class="fas fa-sync-alt"></i> 手动同步</button>
                <button class="btn btn-danger btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>

        <div class="tabs" id="tabContainer">
            <button class="tab active" data-tab="practice">📝 刷题</button>
            <button class="tab" data-tab="wrong">⭐ 错题本</button>
            <button class="tab" data-tab="exam">📋 模拟考试</button>
        </div>

        <!-- 刷题面板 -->
        <div id="practicePanel" class="question-area">
            <div class="chapter-selector">
                <label for="chapterSelect"><i class="fas fa-book"></i> 选择章节：</label>
                <select id="chapterSelect">
                    <option value="all">📚 全部章节</option>
                    <option value="1">第1章 信息化知识</option>
                    <option value="2">第2章 信息系统集成及服务管理</option>
                    <option value="3">第3章 信息系统建设</option>
                </select>
                <button class="btn btn-primary btn-sm" id="applyChapterBtn"><i class="fas fa-check"></i> 应用</button>
            </div>

            <div class="stats" id="practiceStats">
                <span>📊 进度: <span id="progressText">0/0</span></span>
                <span>✅ 正确: <span id="correctCount">0</span></span>
                <span>❌ 错误: <span id="wrongCount">0</span></span>
                <span>⭐ 错题: <span id="wrongBookCount">0</span></span>
            </div>
            <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
            <div id="questionContainer">
                <div class="question-header">
                    <span class="question-number" id="qNum">第 1 题</span>
                    <button class="btn btn-outline btn-sm" id="toggleStarBtn"><i class="fas fa-star"></i> 收藏</button>
                </div>
                <div class="question-text" id="qText">加载题目...</div>
                <div class="options" id="optionsContainer"></div>
                <div class="explanation" id="explanation"></div>
                <div class="action-bar">
                    <div class="left">
                        <button class="btn btn-outline btn-sm" id="prevBtn"><i class="fas fa-arrow-left"></i> 上一题</button>
                        <button class="btn btn-outline btn-sm" id="nextBtn">下一题 <i class="fas fa-arrow-right"></i></button>
                    </div>
                    <div class="right">
                        <button class="btn btn-success btn-sm" id="showAnswerBtn"><i class="fas fa-check"></i> 显示答案</button>
                        <button class="btn btn-danger btn-sm" id="resetProgressBtn"><i class="fas fa-sync-alt"></i> 重置</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 错题本 -->
        <div id="wrongPanel" class="question-area hidden">
            <div class="stats">
                <span>⭐ 错题数: <span id="wrongBookTotal">0</span></span>
                <button class="btn btn-danger btn-sm" id="clearAllWrongBtn"><i class="fas fa-trash"></i> 清空错题本</button>
            </div>
            <div id="wrongList" class="wrong-list">
                <div class="empty-state">⭐ 暂无错题，继续加油！</div>
            </div>
        </div>

        <!-- 模拟考试 -->
        <div id="examPanel" class="question-area hidden">
            <div id="examSettings">
                <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; background:#f0f4f8; padding:16px 20px; border-radius:16px;">
                    <div>
                        <label style="font-weight:600; color:#1a2a3a;">📝 题数：</label>
                        <select id="examCountSelect" style="padding:6px 14px; border:1.5px solid #d5dce4; border-radius:60px; font-size:0.9rem; background:white; outline:none;">
                            <option value="5">5 题</option>
                            <option value="10">10 题</option>
                            <option value="20">20 题</option>
                            <option value="50">50 题</option>
                            <option value="75" selected>75 题</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-weight:600; color:#1a2a3a;">⏱️ 时间：</label>
                        <select id="examTimeSelect" style="padding:6px 14px; border:1.5px solid #d5dce4; border-radius:60px; font-size:0.9rem; background:white; outline:none;">
                            <option value="10">10 分钟</option>
                            <option value="30">30 分钟</option>
                            <option value="60">60 分钟</option>
                            <option value="120" selected>120 分钟</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="startExamBtn"><i class="fas fa-play"></i> 开始考试</button>
                </div>
            </div>
            <div id="examStart" class="hidden">
                <div style="text-align:center; padding:20px;">
                    <h2>📋 模拟考试</h2>
                    <p>共 <strong id="examTotalQCount">5</strong> 题，时间 <strong id="examTotalTime">120</strong> 分钟</p>
                    <p>及格线: <strong>60%</strong></p>
                    <button class="btn btn-primary" id="startExamConfirmBtn"><i class="fas fa-play"></i> 确认开始</button>
                </div>
            </div>
            <div id="examRunning" class="hidden">
                <div class="exam-timer" id="examTimer">⏱️ 02:00:00</div>
                <div class="stats">
                    <span>进度: <span id="examProgress">0/5</span></span>
                    <span>剩余: <span id="examRemaining">5</span> 题</span>
                </div>
                <div class="progress-bar"><div class="fill" id="examProgressFill" style="width:0%"></div></div>
                <div id="examQuestionContainer">
                    <div class="question-header">
                        <span class="question-number" id="examQNum">第 1 题</span>
                    </div>
                    <div class="question-text" id="examQText">加载题目...</div>
                    <div class="options" id="examOptionsContainer"></div>
                    <div class="action-bar">
                        <div class="left">
                            <button class="btn btn-outline btn-sm" id="examPrevBtn"><i class="fas fa-arrow-left"></i> 上一题</button>
                            <button class="btn btn-outline btn-sm" id="examNextBtn">下一题 <i class="fas fa-arrow-right"></i></button>
                        </div>
                        <div class="right">
                            <button class="btn btn-success btn-sm" id="submitExamBtn"><i class="fas fa-check"></i> 交卷</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="examResult" class="hidden">
                <div class="exam-result">
                    <h2>📊 考试成绩</h2>
                    <div style="font-size:4rem; font-weight:700; margin:16px 0;" id="examScoreDisplay">0</div>
                    <div style="font-size:1.2rem;" id="examResultText"></div>
                    <div style="margin-top:20px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                        <button class="btn btn-primary" id="examReviewBtn"><i class="fas fa-list"></i> 查看错题</button>
                        <button class="btn btn-outline" id="examRetryBtn"><i class="fas fa-sync-alt"></i> 重新考试</button>
                    </div>
                    <div id="examWrongReview" style="margin-top:16px; text-align:left;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ================================================================
        // ★★★ 题库数据 ★★★
        // ================================================================
        const QUESTION_BANK = [
            // 第1章：信息化知识（3题）
            { id: 1, chapter: 1, text: '我国信息化发展的基本方针是（ ）？', options: ['A、统筹规划、国家主导', 'B、统一标准、联合建设', 'C、互联互通、资源共享', 'D、以上都是'],
                answer: 'D', explanation: '我国信息化发展的基本方针是：统筹规划、国家主导；统一标准、联合建设；互联互通、资源共享。' },
            { id: 2, chapter: 1, text: '信息化建设中的"三网融合"是指（ ）的融合？', options: ['A、电信网、广播电视网、互联网', 'B、电信网、移动网、卫星网', 'C、局域网、城域网、广域网',
                    'D、有线网、无线网、光纤网'
                ], answer: 'A', explanation: '"三网融合"是指电信网、广播电视网、互联网的融合。' },
            { id: 3, chapter: 1, text: '下列哪一项不属于信息化的基本要素？', options: ['A、信息网络', 'B、信息资源', 'C、信息技术', 'D、信息产业'], answer: 'D',

        // ================================================================

        // ================================================================

        const REPO_NAME = 'xinchu';
        const LABEL_ACTIVATED = '已激活';
        const LABEL_PROGRESS = '刷题进度'; // ★★★ 新增标签 ★★★
        const STORAGE_KEY = 'ruankao_data';

        // 获取 Token
        const urlParams = new URLSearchParams(window.location.search);
        const GITHUB_TOKEN = urlParams.get('token');

        // ================================================================
        // ★★★ 核心数据 ★★★

        let wrongBook = [];

        // ================================================================
        // ★★★ GitHub API 操作（云端同步）★★★
        // ================================================================

        // 通用 GitHub API 请求
        async function githubRequest(endpoint, options = {}) {
            if (!GITHUB_TOKEN) {
                throw new Error('缺少 GitHub Token');
            }
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${endpoint}`;
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.message || `GitHub API 错误: ${response.status}`);
            }
            return response.json();
        }

        // 获取或创建进度 Issue
        async function getProgressIssue(phone) {
            // 先查找是否已存在
            const issues = await githubRequest(
                `issues?labels=${encodeURIComponent(LABEL_PROGRESS)}&state=all&per_page=100`
            );
            const existing = issues.find(issue => issue.title === `进度-${phone}`);
            if (existing) {
                return existing;
            }
            // 不存在则创建
            const newIssue = await githubRequest('issues', {
                method: 'POST',
                body: JSON.stringify({
                    title: `进度-${phone}`,
                    labels: [LABEL_PROGRESS],
                    body: `## 刷题进度\n手机号: ${phone}\n最后更新: ${new Date().toLocaleString()}\n\n---\n\n## 数据\n\`\`\`json\n{}\n\`\`\``
                })
            });
            return newIssue;
        }

        // 从云端加载进度
        async function loadProgressFromCloud(phone) {
            try {
                setSyncStatus('syncing');
                const issue = await getProgressIssue(phone);
                // 从 Issue body 中提取 JSON 数据
                const body = issue.body || '';
                const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/);
                if (jsonMatch && jsonMatch[1]) {
                    const data = JSON.parse(jsonMatch[1]);
                    return data;
                }
                return null;
            } catch (error) {
                console.error('加载云端数据失败:', error);
                setSyncStatus('error');
                return null;
            } finally {
                setSyncStatus('synced');
            }
        }

        // 保存进度到云端
        async function saveProgressToCloud(phone, userAnswersData, wrongBookData) {
            try {
                setSyncStatus('syncing');
                const issue = await getProgressIssue(phone);
                const data = {
                    userAnswers: userAnswersData || userAnswers,
                    wrongBook: wrongBookData || wrongBook,
                    updatedAt: new Date().toISOString()
                };
                const body = `## 刷题进度\n手机号: ${phone}\n最后更新: ${new Date().toLocaleString()}\n\n---\n\n## 数据\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
                await githubRequest(`issues/${issue.number}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ body })
                });
                setSyncStatus('synced');
                return true;
            } catch (error) {
                console.error('保存云端数据失败:', error);
                setSyncStatus('error');
                return false;
            }
        }

        // 手动同步
        async function manualSync() {
            if (!isActivated || !activePhone) {
                showToast('请先激活', 'error');
                return;
            }
            showToast('⏳ 正在同步...', 'info');
            try {
                const cloudData = await loadProgressFromCloud(activePhone);
                if (cloudData) {
                    // 合并云端数据：云端有而本地没有的，或云端更新的
                    let hasUpdate = false;
                    // 合并 userAnswers
                    if (cloudData.userAnswers) {
                        Object.keys(cloudData.userAnswers).forEach(id => {
                            if (!userAnswers[id] || cloudData.userAnswers[id] !== userAnswers[id]) {
                                userAnswers[id] = cloudData.userAnswers[id];
                                hasUpdate = true;
                            }
                        });
                    }
                    // 合并 wrongBook
                    if (cloudData.wrongBook) {
                        cloudData.wrongBook.forEach(item => {
                            if (!wrongBook.some(w => w.id === item.id)) {
                                wrongBook.push(item);
                                hasUpdate = true;
                            }
                        });
                        // 移除本地有但云端没有的错题（如果云端是更新的）
                        if (cloudData.updatedAt) {
                            // 简单策略：如果云端更新时间比本地晚，以云端为准
                            // 这里简化处理，直接合并
                        }
                    }
                    if (hasUpdate) {
                        saveData();
                        renderQuestion();
                        updateStats();
                        renderWrongBook();
                        showToast('✅ 同步成功！数据已更新', 'success');
                    } else {
                        showToast('✅ 已是最新数据', 'success');
                    }
                } else {
                    // 本地没有云端数据，把本地数据推上去
                    await saveProgressToCloud(activePhone);
                    showToast('✅ 本地数据已上传云端', 'success');
                }
            } catch (error) {
                showToast(`❌ 同步失败: ${error.message}`, 'error');
            }
        }

        // 设置同步状态
        function setSyncStatus(status) {

            if (status === 'syncing') {
                indicator.className = 'sync-indicator syncing';
                indicator.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
            } else if (status === 'synced') {
                indicator.className = 'sync-indicator synced';
                indicator.innerHTML = '<i class="fas fa-check-circle"></i> 已同步';
            } else if (status === 'error') {
                indicator.className = 'sync-indicator';
                indicator.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#c0392b;"></i> 同步失败';
            } else {
                indicator.className = 'sync-indicator';
                indicator.innerHTML = '<i class="fas fa-cloud"></i> 已同步';
            }
        }

        // ================================================================

            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    wrongBook = data.wrongBook || [];
                    userAnswers = data.userAnswers || {};

                        // 自动从云端加载
                        setTimeout(() => {
                            manualSync();
                        }, 500);
                    }
                }
            } catch (e) {}
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    wrongBook: wrongBook,
                    userAnswers: userAnswers,
                    phone: activePhone
                }));
                // 自动同步到云端

        // 工具函数
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getQuestionById(id) {
            return QUESTION_BANK.find(q => q.id === id);

            if (!qData) return;
            if (userAnswers[qid] !== val) {
                userAnswers[qid] = val;
                const isCorrect = val === qData.answer;

                        wrongBook.push({ id: qid, userAnswer: val, correctAnswer: qData.answer });

                        showToast('⭐ 已加入错题本', 'success');

            el.innerHTML = `

        function updateStats() {

        }

        // ================================================================
        // ★★★ 模拟考试（与之前相同）★★★
        // ================================================================
        function pickQuestionsByProportion(totalCount, questionBank) {
            const chapterGroups = {};
            questionBank.forEach(q => {
                if (!chapterGroups[q.chapter]) {
                    chapterGroups[q.chapter] = [];
                }
                chapterGroups[q.chapter].push(q);
            });
            const chapters = Object.keys(chapterGroups).map(Number).sort((a, b) => a - b);
            const chapterCounts = {};
            let total = 0;
            chapters.forEach(ch => {
                chapterCounts[ch] = chapterGroups[ch].length;
                total += chapterCounts[ch];
            });
            const result = [];
            let remaining = totalCount;
            const allocated = {};
            chapters.forEach(ch => {
                let count = Math.round((chapterCounts[ch] / total) * totalCount);
                if (count === 0 && chapterCounts[ch] > 0 && totalCount >= chapters.length) {
                    count = 1;
                }
                allocated[ch] = count;
                remaining -= count;
            });
            if (remaining > 0) {
                const sortedChapters = [...chapters].sort((a, b) => chapterCounts[b] - chapterCounts[a]);
                let idx = 0;
                while (remaining > 0) {
                    const ch = sortedChapters[idx % sortedChapters.length];
                    allocated[ch] = (allocated[ch] || 0) + 1;
                    remaining--;
                    idx++;
                }
            }
            chapters.forEach(ch => {
                if (allocated[ch] > chapterCounts[ch]) {
                    allocated[ch] = chapterCounts[ch];
                }
            });
            chapters.forEach(ch => {
                const count = allocated[ch] || 0;
                if (count > 0) {
                    const shuffled = shuffleArray([...chapterGroups[ch]]);
                    result.push(...shuffled.slice(0, count));
                }
            });
            if (result.length < totalCount) {
                const allShuffled = shuffleArray([...questionBank]);
                const existingIds = new Set(result.map(q => q.id));
                const补充 = allShuffled.filter(q => !existingIds.has(q.id));
                const needed = totalCount - result.length;
                result.push(...补充.slice(0, needed));
            }
            return shuffleArray(result);
        }

        function startExam() {

            const time = parseInt(document.getElementById('examTimeSelect').value);

                showToast(`题库只有 ${QUESTION_BANK.length} 题，请减少题数`, 'error');
                return;
            }
            const picked = pickQuestionsByProportion(count, QUESTION_BANK);
            examQuestions = picked;
            examAnswers = {};
            examIndex = 0;
            examSubmitted = false;

            const selected = examAnswers[q.id] || '';
            document.getElementById('examOptionsContainer').innerHTML = q.options.map(opt => {
                const letter = opt.charAt(0);
                const isSelected = selected === letter;
                return `
                        <div class="option ${isSelected ? 'selected' : ''}" data-value="${letter}" onclick="examSelectOption(${q.id}, '${letter}')">
                            <input type="radio" name="examQuestion" value="${letter}" ${isSelected ? 'checked' : ''}>
                            <label>${opt}</label>
                        </div>
                    `;
            }).join('');
            updateExamStats();
        }

        window.examSelectOption = function(qid, val) {
            examAnswers[qid] = val;
            renderExamQuestion();
            updateExamStats();
        };

        function updateExamStats() {
            const total = examQuestions.length;
            const answered = Object.keys(examAnswers).length;
            document.getElementById('examProgress').textContent = `${answered}/${total}`;
            document.getElementById('examRemaining').textContent = total - answered;
            const pct = total > 0 ? (answered / total) * 100 : 0;
            document.getElementById('examProgressFill').style.width = `${Math.min(pct, 100)}%`;
        }

        function updateExamTimer() {
            const hours = Math.floor(examTimeLeft / 3600);
            const mins = Math.floor((examTimeLeft % 3600) / 60);
            const secs = examTimeLeft % 60;
            const el = document.getElementById('examTimer');
            el.textContent =
            `⏱️ ${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            el.classList.toggle('warning', examTimeLeft < 300);
        }

        function submitExam() {
            if (examSubmitted) return;
            if (examTimer) {
                clearInterval(examTimer);
                examTimer = null;
            }
            examSubmitted = true;
            let correct = 0;
            let wrongList = [];
            examQuestions.forEach(q => {
                const userAns = examAnswers[q.id] || '';
                if (userAns === q.answer) {
                    correct++;
                } else {
                    wrongList.push({ ...q, userAnswer: userAns || '未作答' });
                }
            });
            const total = examQuestions.length;
            const score = correct;
            const scorePercent = Math.round((score / total) * 100);
            const passed = scorePercent >= 60;
            document.getElementById('examRunning').style.display = 'none';
            document.getElementById('examResult').style.display = 'block';
            document.getElementById('examResult').classList.remove('hidden');
            document.getElementById('examScoreDisplay').textContent = `${score} / ${total}`;
            document.getElementById('examResultText').innerHTML = `
                    <span class="${passed ? 'pass' : 'fail'}">
                        ${passed ? '🎉 恭喜通过！' : '😅 未通过，再接再厉！'}
                    </span>
                    <br>
                    <span style="font-size:0.9rem; color:#4a6a7a;">
                        答对 ${correct} 题，正确率 ${scorePercent}%
                        ${passed ? '✅ 及格' : '❌ 不及格'}
                    </span>
                `;
            if (wrongList.length > 0) {
                let html = '<div style="margin-top:16px; text-align:left; max-height:300px; overflow-y:auto;"><h4>📖 错题回顾</h4>';
                wrongList.forEach((q, idx) => {
                    html += `
                            <div style="background:#fafcfe; padding:12px; border-radius:8px; margin-bottom:8px; border-left:4px solid #c0392b;">
                                <div style="font-weight:500;">${idx+1}. ${q.text}</div>
                                <div style="font-size:0.85rem; color:#4a6a7a;">你的答案: ${q.userAnswer} | 正确答案: ${q.answer}</div>
                                <div style="font-size:0.85rem; color:#1f7a5a;">解析: ${q.explanation}</div>
                            </div>
                        `;
                });
                html += '</div>';
                document.getElementById('examWrongReview').innerHTML = html;
            } else {
                document.getElementById('examWrongReview').innerHTML =
                    '<div style="text-align:center; padding:16px; color:#1f7a5a;">🎉 全部正确！太棒了！</div>';
            }
            wrongList.forEach(q => {
                const exists = wrongBook.some(item => item.id === q.id);
                if (!exists) {
                    wrongBook.push({ id: q.id, userAnswer: q.userAnswer, correctAnswer: q.answer });
                }
            });
            saveData();
            renderWrongBook();
            updateStats();
        }

        function resetExam() {
            if (examTimer) {
                clearInterval(examTimer);
                examTimer = null;
            }
            examQuestions = [];
            examAnswers = {};
            examIndex = 0;
            examSubmitted = false;
            examTimeLeft = parseInt(document.getElementById('examTimeSelect').value) * 60;
            updateExamTimer();
            document.getElementById('examTimer').classList.remove('warning');
            document.getElementById('examSettings').style.display = 'block';
            document.getElementById('examSettings').classList.remove('hidden');
            document.getElementById('examStart').style.display = 'none';
            document.getElementById('examStart').classList.add('hidden');
            document.getElementById('examRunning').style.display = 'none';
            document.getElementById('examRunning').classList.add('hidden');
            document.getElementById('examResult').style.display = 'none';
            document.getElementById('examResult').classList.add('hidden');
        }

        // ================================================================
        // ★★★ Tab切换 ★★★
        // ================================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            const practicePanel = document.getElementById('practicePanel');
            const wrongPanel = document.getElementById('wrongPanel');
            const examPanel = document.getElementById('examPanel');
            [practicePanel, wrongPanel, examPanel].forEach(p => {
                if (p) {
                    p.classList.add('hidden');
                    p.style.display = 'none';
                }
            });
            if (tab === 'practice' && practicePanel) {
                practicePanel.classList.remove('hidden');
                practicePanel.style.display = 'block';
            } else if (tab === 'wrong' && wrongPanel) {
                wrongPanel.classList.remove('hidden');
                wrongPanel.style.display = 'block';
                renderWrongBook();
            } else if (tab === 'exam' && examPanel) {
                examPanel.classList.remove('hidden');
                examPanel.style.display = 'block';
                if (examSubmitted) {
                    document.getElementById('examSettings').style.display = 'none';
                    document.getElementById('examStart').style.display = 'none';
                    document.getElementById('examRunning').style.display = 'none';
                    document.getElementById('examResult').style.display = 'block';
                } else if (examQuestions.length > 0 && !examSubmitted) {
                    document.getElementById('examSettings').style.display = 'none';
                    document.getElementById('examStart').style.display = 'none';
                    document.getElementById('examRunning').style.display = 'block';
                    document.getElementById('examResult').style.display = 'none';
                } else {
                    document.getElementById('examSettings').style.display = 'block';
                    document.getElementById('examStart').style.display = 'none';
                    document.getElementById('examRunning').style.display = 'none';
                    document.getElementById('examResult').style.display = 'none';
                }
            }
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });

        // ================================================================
        // ★★★ 激活/退出 ★★★
        // ================================================================
        async function performActivation(phone) {
            if (!phone || phone.trim() === '') {
                document.getElementById('statusMsg').textContent = '⚠️ 请输入手机号码';
                document.getElementById('statusMsg').className = 'status-msg error';
                return false;
            }
            const raw = phone.trim();
            if (!/^\d{11}$/.test(raw)) {
                document.getElementById('statusMsg').textContent = '❌ 请输入11位有效手机号';
                document.getElementById('statusMsg').className = 'status-msg error';
                return false;
            }
            // 检查手机号是否已激活（从 GitHub Issues 验证）
            try {
                const url =
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${encodeURIComponent(LABEL_ACTIVATED)}&state=open&per_page=100`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (!response.ok) throw new Error('验证失败');
                const issues = await response.json();
                const authorized = issues.some(issue => issue.title.trim() === raw);
                if (!authorized) {
                    document.getElementById('statusMsg').textContent = '❌ 该手机号未激活，请联系管理员';
                    document.getElementById('statusMsg').className = 'status-msg error';
                    return false;
                }
            } catch (err) {
                document.getElementById('statusMsg').textContent = `❌ 验证失败: ${err.message}`;
                document.getElementById('statusMsg').className = 'status-msg error';
                return false;
            }

            isActivated = true;
            activePhone = raw;
            document.getElementById('statusMsg').textContent = '✅ 激活成功！正在同步数据...';
            document.getElementById('statusMsg').className = 'status-msg sync';
            document.getElementById('statusBadge').textContent = `✅ ${raw}`;
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userInfo').classList.add('active');
            document.getElementById('activePhoneDisplay').textContent = raw;
            document.getElementById('activationArea').style.display = 'none';

            // 加载本地数据
            loadData();
            // 尝试从云端加载
            try {
                const cloudData = await loadProgressFromCloud(raw);
                if (cloudData) {
                    if (cloudData.userAnswers) {
                        Object.keys(cloudData.userAnswers).forEach(id => {
                            userAnswers[id] = cloudData.userAnswers[id];
                        });
                    }
                    if (cloudData.wrongBook) {
                        wrongBook = cloudData.wrongBook;
                    }
                    saveData();
                    showToast('✅ 云端数据已同步', 'success');
                }
            } catch (e) {
                console.warn('云端同步失败，使用本地数据', e);
            }

            loadQuestionsByChapter('all');
            document.getElementById('statusMsg').textContent = '✅ 激活成功！欢迎回来';
            document.getElementById('statusMsg').className = 'status-msg success';
            showToast('✅ 激活成功！开始刷题吧', 'success');
            return true;
        }

        function deactivate() {
            isActivated = false;
            activePhone = '';
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('statusBadge').textContent = '📱 未激活';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('userInfo').classList.remove('active');
            document.getElementById('activationArea').style.display = 'flex';
            document.getElementById('statusMsg').textContent = '🔒 已退出';
            document.getElementById('statusMsg').className = 'status-msg';
            userAnswers = {};
            wrongBook = [];
            currentQuestions = [];
            currentIndex = 0;
            renderQuestion();
            updateStats();
            showToast('已退出', 'info');
            resetExam();
        }

        // ================================================================
        // ★★★ 事件绑定 ★★★
        // ================================================================
        document.getElementById('activateBtn').addEventListener('click', function() {
            performActivation(document.getElementById('phoneInput').value);
        });
        document.getElementById('phoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('activateBtn').click();
            }
        });
        document.getElementById('phoneInput').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });
        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('确认退出？')) deactivate();
        });
        document.getElementById('syncBtn').addEventListener('click', manualSync);

        document.getElementById('applyChapterBtn').addEventListener('click', function() {
            const chapter = document.getElementById('chapterSelect').value;
            loadQuestionsByChapter(chapter);
            const chapterText = document.getElementById('chapterSelect').options[document.getElementById('chapterSelect')
                .selectedIndex].text;
            showToast(`已切换到: ${chapterText}`, 'info');
        });

        document.getElementById('prevBtn').addEventListener('click', function() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            } else {
                showToast('已经是第一题了', 'info');
            }
        });
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                showToast('已经是最后一题了', 'info');
            }
        });
        document.getElementById('showAnswerBtn').addEventListener('click', function() {
            if (currentQuestions.length) {
                showExplanation(currentQuestions[currentIndex]);
            }
        });
        document.getElementById('resetProgressBtn').addEventListener('click', function() {
            if (confirm('确认重置所有刷题进度？')) {
                userAnswers = {};
                wrongBook = [];
                saveData();
                renderQuestion();
                updateStats();
                showToast('✅ 已重置进度', 'success');
            }
        });
        document.getElementById('toggleStarBtn').addEventListener('click', function() {
            if (!currentQuestions.length) return;
            const q = currentQuestions[currentIndex];
            const idx = wrongBook.findIndex(item => item.id === q.id);
            if (idx !== -1) {
                wrongBook.splice(idx, 1);
                saveData();
                renderWrongBook();
                updateStats();
                showToast('已取消收藏', 'info');
            } else {
                wrongBook.push({ id: q.id, userAnswer: userAnswers[q.id] || '未作答', correctAnswer: q.answer });
                saveData();
                renderWrongBook();
                updateStats();
                showToast('⭐ 已加入错题本', 'success');
            }
            renderQuestion();
        });

        document.getElementById('clearAllWrongBtn').addEventListener('click', clearAllWrong);

        document.getElementById('startExamBtn').addEventListener('click', startExam);
        document.getElementById('startExamConfirmBtn').addEventListener('click', confirmStartExam);
        document.getElementById('examRetryBtn').addEventListener('click', resetExam);
        document.getElementById('examReviewBtn').addEventListener('click', function() {
            document.getElementById('examWrongReview').scrollIntoView({ behavior: 'smooth' });
        });
        document.getElementById('examPrevBtn').addEventListener('click', function() {
            if (examIndex > 0) {
                examIndex--;
                renderExamQuestion();
            }
        });
        document.getElementById('examNextBtn').addEventListener('click', function() {
            if (examIndex < examQuestions.length - 1) {
                examIndex++;
                renderExamQuestion();
            } else {
                showToast('已经是最后一题了', 'info');
            }
        });
        document.getElementById('submitExamBtn').addEventListener('click', function() {
            if (confirm('确认交卷？')) {
                submitExam();
            }
        });

        // ================================================================
        // ★★★ 启动 ★★★
        // ================================================================
        loadData();
        if (isActivated && activePhone) {
            loadQuestionsByChapter('all');
            document.getElementById('statusMsg').textContent = '✅ 已自动激活';
            document.getElementById('statusMsg').className = 'status-msg success';
        } else {
            document.getElementById('statusMsg').textContent = '📱 输入手机号点击激活开始刷题';
            document.getElementById('statusMsg').className = 'status-msg';
        }
        switchTab('practice');

        // 检查 Token
        if (!GITHUB_TOKEN) {
            document.getElementById('statusMsg').textContent = '⚠️ 请在 URL 中添加 token 参数';
            document.getElementById('statusMsg').className = 'status-msg error';
        }
    </script>
</body>
</html>
