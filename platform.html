<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软考培训 · 视频与刷题并排</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #eef2f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部导航栏 ===== */
        .navbar {
            background: #1a2a3a;
            color: white;
            padding: 10px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .logo span {
            color: #6ab0e6;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .download-btn {
            background: #1f7a5a;
            color: white;
            padding: 6px 18px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .download-btn:hover {
            background: #146348;
            transform: translateY(-1px);
        }

        /* ===== 主体：左右两栏 ===== */
        .main-container {
            flex: 1;
            display: flex;
            gap: 12px;
            padding: 12px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #f8fafc;
            padding: 10px 16px;
            border-bottom: 2px solid #e8ecf0;
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .panel-header .badge {
            font-size: 0.7rem;
            background: #d5dce4;
            color: #4a6a7a;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: 500;
        }

        .panel iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        /* ===== 响应式：窄屏时上下排列 ===== */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding: 8px;
                gap: 8px;
            }
            .panel {
                flex: 1 1 50%;
                min-height: 300px;
            }
            .navbar {
                padding: 8px 16px;
            }
            .logo {
                font-size: 1.1rem;
            }
            .download-btn {
                font-size: 0.8rem;
                padding: 4px 14px;
            }
        }

        @media (max-width: 480px) {
            .panel {
                min-height: 250px;
            }
            .panel-header {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="navbar">
        <div class="logo">软考<span>· 学习平台</span></div>
        <div class="nav-right">
            <a href="#" class="download-btn" id="downloadBtn">📥 下载资料</a>
        </div>
    </header>

    <!-- ===== 左右两栏 ===== -->
    <div class="main-container">
        <!-- 左栏：看视频 -->
        <div class="panel">
            <div class="panel-header">
                🎬 看视频
                <span class="badge">课程讲解</span>
            </div>
            <iframe src="https://51ruankao.github.io/xinchu_shipin/index.html?token=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"></iframe>
        </div>

        <!-- 右栏：刷题 -->
        <div class="panel">
            <div class="panel-header">
                📝 刷题
                <span class="badge">在线练习</span>
            </div>
            <iframe src="https://51ruankao.github.io/xinchu/index.html?token=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"></iframe>
        </div>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // 请将下方链接替换为您实际的资料下载地址
            const downloadUrl = 'https://pan.baidu.com/s/your-share-link';
            if (downloadUrl === 'https://pan.baidu.com/s/your-share-link') {
                alert('📂 请将 "下载资料" 按钮的链接替换为您课程讲义的下载地址。');
            } else {
                window.open(downloadUrl, '_blank');
            }
        });
    </script>

</body>
</html>
