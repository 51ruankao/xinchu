<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>软考培训 · 统一学习平台</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #eef2f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部导航栏 ===== */
        .navbar {
            background: #1a2a3a;
            color: white;
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 10;
            gap: 6px;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .logo span {
            color: #6ab0e6;
        }

        .download-btn {
            background: #1f7a5a;
            color: white;
            padding: 4px 14px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .download-btn:hover {
            background: #146348;
        }

        /* ===== Tab 标签栏 ===== */
        .tab-bar {
            background: white;
            padding: 6px 16px 0 16px;
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #e8ecf0;
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: #6a7a8a;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            border-radius: 8px 8px 0 0;
            white-space: nowrap;
        }
        .tab-btn:hover {
            color: #1a2a3a;
            background: #f5f8fa;
        }
        .tab-btn.active {
            color: #1a4d66;
            border-bottom-color: #1a4d66;
            background: #f8fafc;
        }
        .tab-btn .badge {
            font-size: 0.65rem;
            background: #d5dce4;
            color: #4a6a7a;
            padding: 1px 8px;
            border-radius: 40px;
            font-weight: 500;
            margin-left: 4px;
        }
        .tab-btn.active .badge {
            background: #1a4d66;
            color: white;
        }

        /* ===== 内容容器 ===== */
        .content-container {
            flex: 1;
            padding: 8px;
            min-height: 0;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            gap: 8px;
        }
        .tab-panel.active {
            display: flex;
        }

        /* ===== 左右两栏 ===== */
        .panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .panel-header {
            background: #f8fafc;
            padding: 6px 14px;
            border-bottom: 2px solid #e8ecf0;
            font-weight: 700;
            font-size: 0.85rem;
            color: #1a2a3a;
            flex-shrink: 0;
        }

        .panel iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        /* ===== 右侧信息面板（默认显示） ===== */
        .info-panel {
            flex: 0 0 260px;
            background: #fafcfe;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8aaec2;
            font-size: 0.85rem;
            flex-direction: column;
            gap: 6px;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        .info-panel .icon {
            font-size: 2rem;
        }
        .info-panel .title {
            font-weight: 600;
            color: #4a6a7a;
        }
        .info-panel .desc {
            font-size: 0.75rem;
        }

        /* ============================================================ */
        /* ===== 手机端适配：隐藏右侧信息面板，iframe占满 ===== */
        /* ============================================================ */
        @media (max-width: 768px) {
            /* 导航栏精简 */
            .navbar {
                padding: 6px 12px;
            }
            .logo {
                font-size: 0.95rem;
            }
            .download-btn {
                font-size: 0.7rem;
                padding: 3px 10px;
            }

            /* Tab标签精简 */
            .tab-bar {
                padding: 4px 10px 0 10px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
                flex-shrink: 0;
            }
            .tab-btn .badge {
                display: none;
            }

            /* 内容区 */
            .content-container {
                padding: 4px;
            }

            /* 面板上下排列，且隐藏右侧信息面板 */
            .tab-panel.active {
                flex-direction: column;
            }

            /* 信息面板在手机上完全隐藏 */
            .info-panel {
                display: none !important;
            }

            /* 主面板占满全部空间 */
            .panel {
                flex: 1;
                min-height: 0;
                border-radius: 8px;
            }

            .panel-header {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
        }

        /* 小屏手机进一步精简 */
        @media (max-width: 420px) {
            .logo {
                font-size: 0.85rem;
            }
            .download-btn {
                font-size: 0.65rem;
                padding: 2px 8px;
            }
            .tab-btn {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            .content-container {
                padding: 2px;
            }
            .panel {
                border-radius: 6px;
            }
            .panel-header {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
        }

        /* 横屏手机/小平板：仍显示信息面板，但缩小宽度 */
        @media (min-width: 600px) and (max-width: 900px) and (orientation: landscape) {
            .info-panel {
                flex: 0 0 160px;
                font-size: 0.7rem;
                padding: 10px;
            }
            .info-panel .icon {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="navbar">
        <div class="logo">软考<span>· 学习平台</span></div>
        <a href="#" class="download-btn" id="downloadBtn">📥 下载资料</a>
    </header>

    <!-- ===== Tab 标签栏 ===== -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="video">🎬 看视频</button>
        <button class="tab-btn" data-tab="practice">📝 刷题</button>
    </div>

    <!-- ===== 内容容器 ===== -->
    <div class="content-container">

        <!-- Tab1：看视频 -->
        <div id="tab-video" class="tab-panel active">
            <div class="panel">
                <div class="panel-header">🎬 视频课程</div>
                <iframe src="https://51ruankao.github.io/xinchu/index_shipin.html?token=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

"></iframe>
            </div>
            <div class="info-panel">
                <div class="icon">📖</div>
                <div class="title">课程配套资料</div>
                <div class="desc">讲义、软件等<br>请点击顶部「下载资料」</div>
            </div>
        </div>

        <!-- Tab2：刷题 -->
        <div id="tab-practice" class="tab-panel">
            <div class="panel">
                <div class="panel-header">📝 刷题练习</div>
                <iframe src="https://51ruankao.github.io/xinchu/index_shuati.html?token=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
"></iframe>
            </div>
            <div class="info-panel">
                <div class="icon">📊</div>
                <div class="title">学习进度</div>
                <div class="desc">错题本、模拟考试等<br>功能在右侧刷题区</div>
            </div>
        </div>
    </div>

    <script>
        // ===== Tab 切换 =====
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabPanels = {
            video: document.getElementById('tab-video'),
            practice: document.getElementById('tab-practice')
        };

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                Object.values(tabPanels).forEach(p => p.classList.remove('active'));
                const tabName = this.dataset.tab;
                if (tabPanels[tabName]) {
                    tabPanels[tabName].classList.add('active');
                }
            });
        });

        // ===== 下载资料 =====
        document.getElementById('downloadBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const downloadUrl = 'https://pan.baidu.com/s/your-share-link';
            if (downloadUrl === 'https://pan.baidu.com/s/your-share-link') {
                alert('📂 请将 "下载资料" 按钮的链接替换为真实下载地址。');
            } else {
                window.open(downloadUrl, '_blank');
            }
        });

        console.log('✅ 软考学习平台已启动（手机自适应优化）');
    </script>

</body>
</html>
